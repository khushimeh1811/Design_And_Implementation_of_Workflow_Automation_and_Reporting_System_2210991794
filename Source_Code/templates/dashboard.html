{% extends "layout.html" %}
{% block content %}

<h2 class="page-title mb-1">Dashboard</h2>
<p class="page-subtitle mb-4">Overview of workflow audits</p>

<div class="row g-4 mb-4">
  <div class="col-md-3">
    <div class="card metric-card">
      <div>Total Audits</div>
      <div class="metric-value">{{ total_runs }}</div>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card metric-card">
      <div>Successful</div>
      <div class="metric-value">{{ success_runs }}</div>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card metric-card">
      <div>Failed</div>
      <div class="metric-value">{{ failed_runs }}</div>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card metric-card">
      <div>Last Run</div>
      <div class="metric-value">
        {{ last_run.finished_at.strftime('%Y-%m-%d') if last_run else '-' }}
      </div>
    </div>
  </div>
</div>

<div class="d-flex justify-content-between mb-3">
  <h5>Audit Trends</h5>
  <a href="{{ url_for('run_audit') }}" class="btn btn-primary">Run Audit</a>
</div>

<div class="card p-3">
  <canvas id="workflowChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
new Chart(document.getElementById('workflowChart'), {
  type: 'bar',
  data: {
    labels: {{ chart_labels|tojson }},
    datasets: [{
      data: {{ chart_values|tojson }},
      backgroundColor: '#000'
    }]
  }
});
</script>

{% endblock %}
